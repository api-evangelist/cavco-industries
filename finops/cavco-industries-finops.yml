specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Cavco Industries
providerId: cavco-industries
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Manufactured Homes
  - Housing
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps scaffold for Cavco Industries. No public API pricing exists; meters
  capture integration telemetry against retailer / lender contracts that are the actual cost surface.'
notes: Cost surface is contract-driven; no per-call invoicing.
sources:
  - https://www.cavco.com
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Cavco Industries, Inc.
serviceCategory: Manufactured Housing
billingModel:
  pricingCategory: Custom (Partner Contract)
  billingFrequency: Per-Contract
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Cavco Industries API
  ServiceCategory: Manufactured Housing
  ProviderName: Cavco Industries
  PublisherName: Cavco Industries, Inc.
  InvoiceIssuerName: Cavco Industries, Inc.
  BillingCurrency: USD
meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
      - partner
  - name: orders_synchronized
    unit: order
    aggregation: count
    dimensions:
      - retailer
principles:
  - name: Visibility
    description: Track partner integration via the negotiated reporting surface delivered with the retailer
      / lender contract; no public usage API.
  - name: Allocation
    description: Tag integration costs to the retailer or lender relationship that drives them.
  - name: Optimization
    description: Batch order / inventory updates aligned to Cavco's published refresh windows.
  - name: Accountability
    description: A retail-channel owner reconciles partner fees against contracts; IT owns integration
      uptime.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
